<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queue System — Login</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <h1>Queue System</h1>
    <p>Staff &amp; Admin Login</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@organisation.mv">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>
    <button class="btn btn-navy btn-lg" id="loginBtn">Log In</button>
    <div class="error" id="errorBox"></div>
    <p class="muted" style="margin-top:18px;font-size:12px;text-align:center;">
      Public screens: <a href="display.html" style="color:var(--teal);font-weight:600;">Display Board</a> ·
      <a href="kiosk.html" style="color:var(--teal);font-weight:600;">Kiosk</a>
    </p>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const errorBox = document.getElementById('errorBox');

// If already logged in, redirect based on role
auth.onAuthStateChanged(async (user) => {
  if (user) {
    const snap = await db.collection('users').doc(user.uid).get();
    if (snap.exists) {
      const role = snap.data().role;
      window.location.href = role === 'admin' ? 'admin.html' : 'counter.html';
    }
  }
});

document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

async function login(){
  errorBox.style.display='none';
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if(!email || !password){
    showError('Please enter email and password.');
    return;
  }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Logging in…';
  try{
    const cred = await auth.signInWithEmailAndPassword(email, password);
    const snap = await db.collection('users').doc(cred.user.uid).get();
    if(!snap.exists){
      showError('No profile found for this account. Contact your admin.');
      await auth.signOut();
      return;
    }
    const role = snap.data().role;
    window.location.href = role === 'admin' ? 'admin.html' : 'counter.html';
  }catch(err){
    showError(friendlyError(err.code));
  }finally{
    btn.disabled = false; btn.textContent = 'Log In';
  }
}

function friendlyError(code){
  switch(code){
    case 'auth/invalid-email': return 'Invalid email address.';
    case 'auth/user-not-found':
    case 'auth/wrong-password':
    case 'auth/invalid-credential': return 'Incorrect email or password.';
    case 'auth/too-many-requests': return 'Too many attempts. Try again later.';
    default: return 'Login failed. Please try again.';
  }
}
function showError(msg){
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
}
</script>
</body>
</html>
